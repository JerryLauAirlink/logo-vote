<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公司圖片投票 (實名制)</title>
    <style>
        :root { --primary: #007bff; --bg: #f8f9fa; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); text-align: center; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        .header { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 25px; }
        
        .login-box { margin: 20px 0; padding: 15px; border-top: 1px solid #eee; }
        input[type="text"] { padding: 12px; width: 280px; border-radius: 8px; border: 2px solid #ddd; font-size: 1rem; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--primary); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 12px; overflow: hidden; border: 4px solid transparent; cursor: pointer; transition: 0.25s; position: relative; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        
        .card.selected { border-color: var(--primary); transform: scale(1.02); }
        .card.selected::after { content: "✓"; position: absolute; top: 10px; right: 10px; background: var(--primary); color: white; width: 28px; height: 28px; border-radius: 50%; line-height: 28px; font-weight: bold; }
        
        .card img { width: 100%; height: 200px; object-fit: cover; background: #eee; display: block; }
        .info { padding: 10px; font-weight: bold; color: #444; }

        #submit-btn { margin-top: 40px; padding: 18px 60px; font-size: 1.2rem; background: var(--primary); color: white; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(0,123,255,0.3); }
        #submit-btn:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }
        
        .hidden { display: none; }
        #msg { font-size: 1.5rem; color: #28a745; margin-top: 100px; padding: 40px; background: white; border-radius: 20px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .back-btn { display: block; margin-top: 20px; color: #007bff; cursor: pointer; text-decoration: underline; font-size: 1rem; }
    </style>
</head>
<body>

<div class="container" id="main-content">
    <div class="header">
        <h1>📸 公司首輪投票 (17 選 3)</h1>
        <div class="login-box">
            <label style="font-weight: bold; display: block; margin-bottom: 10px;">請輸入你的姓名：</label>
            <input type="text" id="userName" placeholder="例如: Peter Chan (HK)" oninput="checkForm()">
        </div>
        <p>請選出 <strong>3 張</strong> 你最喜歡的作品</p>
        <p style="font-size: 1.1rem;">已選擇：<span id="vote-count" style="color:var(--primary); font-weight:bold;">0</span> / 3</p>
    </div>

    <div class="grid" id="imageGrid"></div>

    <button id="submit-btn" disabled onclick="submitVotes()">確認提交投票</button>
</div>

<div id="msg" class="hidden">
    🎉 <strong>投票成功！</strong><br>
    數據已記錄到 Google Sheet。<br>
    <span class="back-btn" onclick="resetForm()">返回再次投票</span>
</div>

<script>
    const TOTAL_IMAGES = 17;
    const MAX_VOTES = 3;
    const SCRIPT_URL = 'https://google.com';

    let selectedSet = new Set();

    // 初始化渲染
    window.onload = () => {
        renderGrid();
    };

    function renderGrid() {
        const grid = document.getElementById('imageGrid');
        grid.innerHTML = ""; 
        for (let i = 1; i <= TOTAL_IMAGES; i++) {
            const card = document.createElement('div');
            card.className = 'card';
            
            // 重要：修正檔名空格處理
            const rawName = `login one ${i}.png`;
            const imgPath = encodeURI(rawName); 
            
            card.innerHTML = `
                <img src="${imgPath}" alt="Option ${i}" loading="lazy">
                <div class="info">選項 ${i}</div>
            `;
            card.onclick = () => toggleSelect(i, card);
            grid.appendChild(card);
        }
    }

    function toggleSelect(id, element) {
        if (selectedSet.has(id)) {
            selectedSet.delete(id);
            element.classList.remove('selected');
        } else {
            if (selectedSet.size >= MAX_VOTES) {
                alert(`最多只能選 ${MAX_VOTES} 張圖！`);
                return;
            }
            selectedSet.add(id);
            element.classList.add('selected');
        }
        checkForm();
    }

    function checkForm() {
        const name = document.getElementById('userName').value.trim();
        const count = selectedSet.size;
        document.getElementById('vote-count').innerText = count;
        document.getElementById('submit-btn').disabled = (count !== MAX_VOTES || name === "");
    }

    async function submitVotes() {
        const name = document.getElementById('userName').value.trim();
        const selection = Array.from(selectedSet).sort((a,b)=>a-b).join(", ");
        const btn = document.getElementById('submit-btn');
        
        btn.disabled = true;
        btn.innerText = "正在提交...";

        try {
            await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ userName: name, selectedIds: selection }) 
            });

            document.getElementById('main-content').classList.add('hidden');
            document.getElementById('msg').classList.remove('hidden');
        } catch (error) {
            alert("提交失敗，請檢查網路。");
            btn.disabled = false;
            btn.innerText = "確認提交投票";
        }
    }

    function resetForm() {
        selectedSet.clear();
        document.getElementById('userName').value = "";
        document.getElementById('main-content').classList.remove('hidden');
        document.getElementById('msg').classList.add('hidden');
        renderGrid();
        checkForm();
    }
</script>

</body>
</html>
